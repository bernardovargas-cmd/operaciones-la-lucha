/* ─── App state ─── */
const charts = [null, null, null, null];
const filterState = ['all','all','all','all'];
let granularity = 'weekly';
let activeTab = 0;

/* ─── Daily brand aggregate (weighted by orders) ─── */
function getDailyBrandData(bi) {
  const numDays = DAILY_DAYS.length;
  const out = { int:[], rw:[], rp:[], ra:[], del:[], e2e:[] };
  for (let di = 0; di < numDays; di++) {
    let totalOrders=0, sumInt=0, sumRw=0, sumRp=0, sumRa=0, sumDel=0, sumE2e=0, hasData=false;
    DAILY_STORES[bi].forEach(s => {
      const row = s.d[di];
      if (row) {
        const n = row[0];
        totalOrders += n;
        sumE2e += row[1]*n; sumInt += row[2]*n; sumRw += row[3]*n;
        sumRp  += row[4]*n; sumRa  += row[5]*n; sumDel += row[6]*n;
        hasData = true;
      }
    });
    if (hasData && totalOrders > 0) {
      const r = v => parseFloat((v/totalOrders).toFixed(1));
      out.e2e.push(r(sumE2e)); out.int.push(r(sumInt)); out.rw.push(r(sumRw));
      out.rp.push(r(sumRp));   out.ra.push(r(sumRa));   out.del.push(r(sumDel));
    } else {
      out.e2e.push(null); out.int.push(null); out.rw.push(null);
      out.rp.push(null);  out.ra.push(null);  out.del.push(null);
    }
  }
  return out;
}

/* ─── Get chart data for a brand/filter/granularity ─── */
function getChartData(bi, storeId) {
  if (granularity === 'weekly') {
    if (storeId === 'all') {
      const b = BRAND[bi];
      return { int:b.int, rw:b.rw, rp:b.rp, ra:b.ra, del:b.del, e2e:b.e2e };
    }
    const s = STORES[bi].find(x => x.id === storeId);
    const out = { int:[], rw:[], rp:[], ra:[], del:[], e2e:[] };
    W.forEach((_, wi) => {
      const row = s.d[wi];
      if (row) { out.int.push(row[2]); out.rw.push(row[3]); out.rp.push(row[4]); out.ra.push(row[5]); out.del.push(row[6]); out.e2e.push(row[1]); }
      else      { out.int.push(null);  out.rw.push(null);   out.rp.push(null);   out.ra.push(null);   out.del.push(null);   out.e2e.push(null); }
    });
    return out;
  } else {
    // daily
    if (storeId === 'all') return getDailyBrandData(bi);
    const s = DAILY_STORES[bi].find(x => x.id === storeId);
    if (!s) return getDailyBrandData(bi);
    const out = { int:[], rw:[], rp:[], ra:[], del:[], e2e:[] };
    DAILY_DAYS.forEach((_, di) => {
      const row = s.d[di];
      if (row) { out.int.push(row[2]); out.rw.push(row[3]); out.rp.push(row[4]); out.ra.push(row[5]); out.del.push(row[6]); out.e2e.push(row[1]); }
      else      { out.int.push(null);  out.rw.push(null);   out.rp.push(null);   out.ra.push(null);   out.del.push(null);   out.e2e.push(null); }
    });
    return out;
  }
}

/* ─── Cooking residual (fills gap to E2E) ─── */
function addCooking(d) {
  d.cok = d.e2e.map((e,i) => e == null ? null :
    Math.max(0, parseFloat((e - d.int[i] - d.rw[i] - d.rp[i] - d.ra[i] - d.del[i]).toFixed(1))));
  return d;
}

/* ─── Get last non-null KPI values ─── */
function getKPI(bi, storeId) {
  const d = getChartData(bi, storeId);
  const labels = granularity === 'weekly' ? W : DAILY_DAYS;
  let idx = labels.length - 1;
  while (idx >= 0 && d.e2e[idx] == null) idx--;
  return { e2e:d.e2e[idx], int:d.int[idx], rw:d.rw[idx], rp:d.rp[idx], ra:d.ra[idx], del:d.del[idx], label:labels[idx] };
}

/* ─── SLA helpers ─── */
function slaClass(val, threshold) {
  if (val == null) return '';
  return val > threshold*1.3 ? 'crit' : val > threshold ? 'warn' : 'ok';
}
function slaNote(val, threshold) {
  if (val == null) return '—';
  if (val > threshold*1.3) return `SLA <${threshold} 🔴`;
  if (val > threshold)     return `SLA <${threshold} ⚠️`;
  return `SLA <${threshold} ✅`;
}

/* ─── KPI cards ─── */
function renderKPIs(bi, storeId) {
  const k = getKPI(bi, storeId);
  const el = document.getElementById(`kpis-${bi}`);
  const fmt = v => v != null ? v.toFixed(1) : '—';
  el.innerHTML = `
    <div class="kpi ${slaClass(k.e2e,SLA.e2e)}"><div class="kl">E2E (${k.label})</div><div class="kv">${fmt(k.e2e)}<small> min</small></div><div class="kn">${slaNote(k.e2e,SLA.e2e)}</div></div>
    <div class="kpi ${slaClass(k.int,SLA.int)}"><div class="kl">Integration</div><div class="kv">${fmt(k.int)}<small> min</small></div><div class="kn">${slaNote(k.int,SLA.int)}</div></div>
    <div class="kpi ${k.rw > 5 ? 'crit' : k.rw > 3 ? 'warn' : 'ok'}"><div class="kl">Rest Wait RT</div><div class="kv">${fmt(k.rw)}<small> min</small></div><div class="kn">Asignación RT</div></div>
    <div class="kpi ${slaClass(k.rp,SLA.rp)}"><div class="kl">RTWT Perm</div><div class="kv">${fmt(k.rp)}<small> min</small></div><div class="kn">${slaNote(k.rp,SLA.rp)}</div></div>
    <div class="kpi ${slaClass(k.ra,SLA.ra)}"><div class="kl">RTWT After</div><div class="kv">${fmt(k.ra)}<small> min</small></div><div class="kn">${slaNote(k.ra,SLA.ra)}</div></div>
    <div class="kpi ${slaClass(k.del,SLA.del)}"><div class="kl">Delivery</div><div class="kv">${fmt(k.del)}<small> min</small></div><div class="kn">${slaNote(k.del,SLA.del)}</div></div>`;
}

/* ─── Label helper for datalabels ─── */
function lbl(min) {
  return {
    display: ctx => { const v = ctx.dataset.data[ctx.dataIndex]; return v != null && v >= min; },
    color:'#fff', font:{size:10,weight:'800'}, formatter: v => v.toFixed(1),
    anchor:'center', align:'center', textShadowBlur:4, textShadowColor:'rgba(0,0,0,.4)'
  };
}

/* ─── Build / recreate chart ─── */
function updateChart(bi, storeId) {
  const d = addCooking(getChartData(bi, storeId));
  const labels = granularity === 'weekly' ? W : DAILY_DAYS;
  const maxE2E = Math.max(...d.e2e.filter(v => v != null));
  const isDaily = granularity === 'daily';

  /* Segment order: Integration → Cocina → Rest_Wait_RT → RTWT_perm → RTWT_after → Delivery */
  const datasets = [
    { type:'bar',  label:'Integration',  data:d.int, backgroundColor:P.int, stack:'s', categoryPercentage:.72, barPercentage:.88, datalabels:lbl(1.2) },
    { type:'bar',  label:'Cocina',       data:d.cok, backgroundColor:P.cok, stack:'s', categoryPercentage:.72, barPercentage:.88, datalabels:lbl(1.5) },
    { type:'bar',  label:'Rest_Wait_RT', data:d.rw,  backgroundColor:P.rw,  stack:'s', categoryPercentage:.72, barPercentage:.88, datalabels:lbl(1.5) },
    { type:'bar',  label:'RTWT_perm',    data:d.rp,  backgroundColor:P.rp,  stack:'s', categoryPercentage:.72, barPercentage:.88, datalabels:lbl(1.5) },
    { type:'bar',  label:'RTWT_after',   data:d.ra,  backgroundColor:P.ra,  stack:'s', categoryPercentage:.72, barPercentage:.88, datalabels:lbl(1.5) },
    { type:'bar',  label:'Delivery',     data:d.del, backgroundColor:P.del, stack:'s', categoryPercentage:.72, barPercentage:.88, datalabels:lbl(1.5) },
    { type:'line', label:'E2E', data:d.e2e, borderColor:P.e2e, backgroundColor:'transparent',
      borderWidth:3, pointBackgroundColor:P.e2e, pointBorderColor:'#fff', pointBorderWidth:2.5,
      pointRadius: isDaily ? 3 : 6, tension:.3, spanGaps:false, order:0,
      datalabels:{ display: isDaily ? false : true, color:P.e2e, font:{size:12,weight:'900'},
        anchor:'end', align:'top', offset:5, formatter:v => v != null ? v.toFixed(1) : '' } }
  ];

  // Always destroy + recreate (handles label-count change between daily/weekly)
  if (charts[bi]) { charts[bi].destroy(); charts[bi] = null; }

  const ctx = document.getElementById(`c${bi}`).getContext('2d');
  charts[bi] = new Chart(ctx, {
    data: { labels, datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top: isDaily ? 10 : 28, right:12 } },
      interaction:{ mode:'index' },
      plugins:{
        legend:{ position:'bottom', align:'center',
          labels:{ usePointStyle:true, pointStyle:'rectRounded', font:{size:12,weight:'600'}, padding:18, color:'#374151', boxWidth:12, boxHeight:12 } },
        tooltip:{ backgroundColor:'rgba(15,23,42,.92)', titleColor:'#f8fafc', bodyColor:'#cbd5e1',
          padding:12, cornerRadius:8,
          callbacks:{ label: c => `  ${c.dataset.label}: ${c.parsed.y != null ? c.parsed.y.toFixed(1) : '—'} min` } },
        datalabels:{}
      },
      scales:{
        x:{ stacked:true, grid:{display:false}, border:{color:'#e2e8f0'},
            ticks:{ font:{size: isDaily ? 8 : 11}, color:'#64748b',
                    maxRotation: isDaily ? 45 : 0, maxTicksLimit: isDaily ? 18 : 20 } },
        y:{ stacked:true, beginAtZero:true, suggestedMax: maxE2E * 1.25,
            grid:{color:'#f1f5f9'}, border:{color:'#e2e8f0',dash:[3,3]},
            ticks:{ font:{size:11}, color:'#64748b', callback: v => v+' min' },
            title:{display:true,text:'Minutos',font:{size:10},color:'#94a3b8'} }
      }
    }
  });
}

/* ─── Render data table ─── */
function renderTable(bi, storeId) {
  const d = addCooking(getChartData(bi, storeId));
  const labels = granularity === 'weekly' ? W : DAILY_DAYS;
  const periodLabel = granularity === 'weekly' ? 'Semana' : 'Fecha';
  const detailLabel = granularity === 'weekly' ? 'semanal' : 'diario';
  const storeName = storeId === 'all' ? BRAND[bi].name : (STORES[bi].find(x=>x.id===storeId)||{name:'—'}).name;
  const chipClass = e => e == null ? '' : e <= SLA.e2e ? 'ok2' : e <= SLA.e2e*1.3 ? 'warn2' : 'crit2';
  const fmt = v => v != null ? v.toFixed(1) : '—';
  let rows = '';
  labels.forEach((lk, i) => {
    if (d.e2e[i] == null) return;
    /* Column order matches bar order: int → cok → rw → rp → ra → del → e2e */
    rows += `<tr><td>${lk}</td><td>${fmt(d.int[i])}</td><td>${fmt(d.cok[i])}</td><td>${fmt(d.rw[i])}</td><td>${fmt(d.rp[i])}</td><td>${fmt(d.ra[i])}</td><td>${fmt(d.del[i])}</td><td><span class="ch ${chipClass(d.e2e[i])}">${fmt(d.e2e[i])}</span></td></tr>`;
  });
  document.getElementById(`tbl-${bi}`).innerHTML = `
    <div class="ttitle">${storeName} — Detalle ${detailLabel}</div>
    <table>
      <thead><tr>
        <th>${periodLabel}</th>
        <th><span class="sw" style="background:${P.int}"></span>Integration</th>
        <th><span class="sw" style="background:${P.cok}"></span>Cocina</th>
        <th><span class="sw" style="background:${P.rw}"></span>Rest Wait RT</th>
        <th><span class="sw" style="background:${P.rp}"></span>RTWT Perm</th>
        <th><span class="sw" style="background:${P.ra}"></span>RTWT After</th>
        <th><span class="sw" style="background:${P.del}"></span>Delivery</th>
        <th><span class="sw" style="background:${P.e2e}"></span>E2E</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ─── Store filter changed ─── */
function onFilter(bi) {
  const storeId = document.getElementById(`flt-${bi}`).value;
  filterState[bi] = storeId;
  let info = '';
  if (storeId !== 'all') {
    const src = granularity === 'weekly' ? STORES[bi] : DAILY_STORES[bi];
    const s = src.find(x => x.id === storeId);
    if (s) {
      const total = s.d.reduce((sum,row) => sum+(row?row[0]:0), 0);
      info = `${total.toLocaleString()} órdenes`;
    }
  }
  document.getElementById(`flt-info-${bi}`).textContent = info;
  renderKPIs(bi, storeId);
  updateChart(bi, storeId);
  renderTable(bi, storeId);
}

/* ─── Granularity toggle ─── */
function setGranularity(g) {
  if (granularity === g) return;
  granularity = g;
  document.getElementById('btn-weekly').classList.toggle('on', g === 'weekly');
  document.getElementById('btn-daily').classList.toggle('on', g === 'daily');
  document.getElementById('gran-info').textContent = g === 'weekly'
    ? 'Feb 02 – Mar 30, 2026 \u00b7 9 semanas'
    : 'Mar 01 – Abr 05, 2026 \u00b7 36 días';
  // Re-render only the active tab
  const bi = activeTab;
  renderKPIs(bi, filterState[bi]);
  updateChart(bi, filterState[bi]);
  renderTable(bi, filterState[bi]);
}

/* ─── Build panels ─── */
function buildPanels() {
  const container = document.getElementById('panels');
  BRAND.forEach((b, bi) => {
    const storeOpts = STORES[bi].map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    const panel = document.createElement('div');
    panel.className = 'panel' + (bi===0?' on':'');
    panel.id = `p${bi}`;
    panel.innerHTML = `
      <div class="filter-bar">
        <span class="filter-label">Tienda:</span>
        <select class="filter-select" id="flt-${bi}" onchange="onFilter(${bi})">
          <option value="all">Todas las tiendas</option>
          ${storeOpts}
        </select>
        <span class="filter-info" id="flt-info-${bi}"></span>
      </div>
      <div class="kpis" id="kpis-${bi}"></div>
      <div class="cbox">
        <div class="ctitle">
          <h2>E2E | ${b.name} — Ally Times</h2>
          <span id="ctitle-span-${bi}">minutos promedio</span>
        </div>
        <div class="cwrap"><canvas id="c${bi}"></canvas></div>
      </div>
      <div class="tbox" id="tbl-${bi}"></div>`;
    container.appendChild(panel);
  });
}

/* ─── Tab switch ─── */
function go(i) {
  activeTab = i;
  document.querySelectorAll('.panel').forEach((el,j) => el.classList.toggle('on', j===i));
  document.querySelectorAll('.tab').forEach((btn,j) => btn.classList.toggle('on', j===i));
  // Lazy-render tabs that haven't been built yet
  if (!charts[i]) {
    renderKPIs(i, filterState[i]);
    updateChart(i, filterState[i]);
    renderTable(i, filterState[i]);
  }
}

/* ─── Init ─── */
buildPanels();
[0,1,2,3].forEach(bi => {
  renderKPIs(bi, 'all');
  updateChart(bi, 'all');
  renderTable(bi, 'all');
});
